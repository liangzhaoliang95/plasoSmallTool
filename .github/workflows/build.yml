name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package artifacts
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath plasoSmallTool_windows_x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plasoSmallTool_windows_x64
          path: plasoSmallTool_windows_x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Package artifacts
        run: |
          cd build/macos/Build/Products/Release
          zip -r "${{ github.workspace }}/plasoSmallTool_macos_arm64.zip" "plasoSmallTool.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plasoSmallTool_macos_arm64
          path: plasoSmallTool_macos_arm64.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            plasoSmallTool_windows_x64/plasoSmallTool_windows_x64.zip
            plasoSmallTool_macos_arm64/plasoSmallTool_macos_arm64.zip
