name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Copy VC Runtime DLLs
        run: |
          $dirs = @(
            "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC",
            "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Redist\MSVC",
            "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Redist\MSVC"
          )
          $redistRoot = $dirs | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $redistRoot) { throw "Cannot find VC Redist path" }
          $crtDir = Get-ChildItem "$redistRoot\*\x64\Microsoft.VC143.CRT" -Directory -ErrorAction SilentlyContinue |
                    Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $crtDir) { throw "Cannot find Microsoft.VC143.CRT directory" }
          Copy-Item "$($crtDir.FullName)\*.dll" "build\windows\x64\runner\Release\"
          echo "✓ Copied VC Runtime DLLs from $($crtDir.FullName)"

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build NSIS installer
        run: |
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:').Line -replace 'version: ', '' -replace '\+.*', ''
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DAPP_VERSION=$version "${{ github.workspace }}\windows\installer.nsi"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plasoSmallTool_windows_x64
          path: build\windows\x64\runner\plasoSmallTool_setup.exe

  build-macos:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "plasoSmallTool" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "plasoSmallTool.app" 150 185 \
            --hide-extension "plasoSmallTool.app" \
            --app-drop-link 450 185 \
            "plasoSmallTool_macos_arm64.dmg" \
            "build/macos/Build/Products/Release/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plasoSmallTool_macos_arm64
          path: plasoSmallTool_macos_arm64.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/') && (needs.build-windows.result == 'success' || needs.build-macos.result == 'success')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            plasoSmallTool_setup.exe
            plasoSmallTool_macos_arm64.dmg
